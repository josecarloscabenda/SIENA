name: Frontend CI

on:
  push:
    paths:
      - "frontend/web/**"
  pull_request:
    paths:
      - "frontend/web/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Lint
        working-directory: frontend/web
        run: npm run lint

      - name: Build
        working-directory: frontend/web
        run: npm run build