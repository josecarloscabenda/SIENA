name: Backend CI

on:
  push:
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siena_test
          POSTGRES_USER: siena
          POSTGRES_PASSWORD: siena
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install .[dev]

      - name: Lint
        working-directory: backend
        run: ruff check src/

      - name: Type check
        working-directory: backend
        run: mypy src/

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://siena:siena@localhost:5432/siena_test
        run: pytest --cov=src --cov-report=term-missing